---
# Deployer webapp defaults

# GitHub release download
deployer_github_repo: mtdig/az-wp-inst
deployer_version: "{{ lookup('file', playbook_dir + '/../../deployer/version.txt') | trim }}"
deployer_release_url: >-
  https://github.com/{{ deployer_github_repo }}/releases/download/deployer-{{ deployer_version }}/deployer

# Pad naar de deployer source dir (voor templates/ en migrations/)
deployer_src_dir: "{{ playbook_dir }}/../../deployer"

# Netwerk
deployer_port: 3001

# Database (draait op dezelfde MySQL als Semaphore)
deployer_db_password: deployer

# Semaphore project ID
deployer_semaphore_project_id: 1

# Admin seed user (wordt aangemaakt als die nog niet bestaat)
deployer_admin_id: "00000000-0000-0000-0000-000000000001"
deployer_admin_user: admin
deployer_admin_full_name: Administrator
# Default: plaintext "admin" – vervang door argon2 hash in productie
deployer_admin_password_hash: admin
