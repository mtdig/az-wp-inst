---
# OS-NPE 2526 container + Valkey cache

- name: Docker dependencies installeren
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Docker GPG sleutel toevoegen
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Docker repository toevoegen
  shell: |
    echo \
      "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
      tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Docker Engine + Compose plugin installeren
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Docker service inschakelen
  service:
    name: docker
    state: started
    enabled: true

- name: OS-NPE directory aanmaken
  file:
    path: /opt/os-npe
    state: directory
    mode: "0755"

- name: Docker Compose bestand aanmaken
  template:
    src: docker-compose.yml.j2
    dest: /opt/os-npe/docker-compose.yml
    mode: "0644"
  register: npe_compose

- name: Systemd service installeren
  template:
    src: os-npe.service.j2
    dest: /etc/systemd/system/os-npe.service
    mode: "0644"
  register: npe_service

- name: Systemd herladen
  systemd:
    daemon_reload: true
  when: npe_service.changed

- name: OS-NPE service inschakelen en starten
  systemd:
    name: os-npe
    state: "{{ 'restarted' if npe_compose.changed else 'started' }}"
    enabled: true

- name: Wacht tot OS-NPE webserver klaar is
  uri:
    url: http://127.0.0.1:8082/
    status_code: [200, 302, 301]
  register: npe_health
  until: npe_health.status in [200, 302, 301]
  retries: 15
  delay: 5

- name: Apache proxy modules inschakelen
  apache2_module:
    name: "{{ item }}"
    state: present
  loop:
    - proxy
    - proxy_http
    - rewrite
    - headers
  notify: Apache herstarten

- name: Apache reverse proxy configuratie voor OS-NPE
  template:
    src: os-npe.conf.j2
    dest: /etc/apache2/conf-available/os-npe.conf
  notify: Apache herstarten

- name: OS-NPE Apache configuratie inschakelen
  file:
    src: /etc/apache2/conf-available/os-npe.conf
    dest: /etc/apache2/conf-enabled/os-npe.conf
    state: link
  notify: Apache herstarten
