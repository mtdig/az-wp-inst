---
- name: Docker afhankelijkheden installeren
  apt:
    name:
      - ca-certificates
      - curl
      - gnupg
    state: present
    update_cache: true

- name: Docker GPG sleutel toevoegen
  shell: |
    install -m 0755 -d /etc/apt/keyrings
    curl -fsSL https://download.docker.com/linux/ubuntu/gpg \
      -o /etc/apt/keyrings/docker.asc
    chmod a+r /etc/apt/keyrings/docker.asc
  args:
    creates: /etc/apt/keyrings/docker.asc

- name: Docker repository toevoegen
  shell: |
    echo \
      "deb [arch=$(dpkg --print-architecture) signed-by=/etc/apt/keyrings/docker.asc] \
      https://download.docker.com/linux/ubuntu \
      $(. /etc/os-release && echo "$VERSION_CODENAME") stable" | \
      tee /etc/apt/sources.list.d/docker.list > /dev/null
  args:
    creates: /etc/apt/sources.list.d/docker.list

- name: Docker Engine + Compose plugin installeren
  apt:
    name:
      - docker-ce
      - docker-ce-cli
      - containerd.io
      - docker-compose-plugin
    state: present
    update_cache: true

- name: Docker service inschakelen
  service:
    name: docker
    state: started
    enabled: true

- name: Uptime Kuma directories aanmaken
  file:
    path: "{{ item }}"
    state: directory
    mode: "0755"
  loop:
    - /opt/uptime-kuma
    - /opt/uptime-kuma/data

- name: Docker Compose bestand aanmaken
  template:
    src: docker-compose.yml.j2
    dest: /opt/uptime-kuma/docker-compose.yml
    mode: "0644"
  register: kuma_compose

- name: Systemd service installeren
  template:
    src: uptime-kuma.service.j2
    dest: /etc/systemd/system/uptime-kuma.service
    mode: "0644"
  register: kuma_service

- name: Systemd herladen
  systemd:
    daemon_reload: true
  when: kuma_service.changed

- name: Uptime Kuma service inschakelen en starten
  systemd:
    name: uptime-kuma
    state: "{{ 'restarted' if kuma_compose.changed else 'started' }}"
    enabled: true

- name: Wacht tot Uptime Kuma klaar is
  uri:
    url: http://127.0.0.1:3001
    status_code: 200
  register: kuma_health
  until: kuma_health.status == 200
  retries: 15
  delay: 5

- name: Apache proxy modules inschakelen
  apache2_module:
    name: "{{ item }}"
    state: present
  loop:
    - proxy
    - proxy_http
    - proxy_wstunnel
  notify: Apache herstarten

- name: Apache reverse proxy configuratie voor Uptime Kuma
  template:
    src: uptime-kuma.conf.j2
    dest: /etc/apache2/conf-available/uptime-kuma.conf
  notify: Apache herstarten

- name: Uptime Kuma Apache configuratie inschakelen
  file:
    src: /etc/apache2/conf-available/uptime-kuma.conf
    dest: /etc/apache2/conf-enabled/uptime-kuma.conf
    state: link
  notify: Apache herstarten
