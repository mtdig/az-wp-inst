---
# mysql_client – installeer MySQL client tools en seed de remote Azure MySQL databank

- name: Installeer MySQL client en PyMySQL
  apt:
    name:
      - mysql-client
      - python3-pymysql
    state: present
    update_cache: false

- name: Wacht tot Azure MySQL bereikbaar is
  wait_for:
    host: "{{ wp_db_host }}"
    port: "{{ wp_db_port }}"
    timeout: 60

- name: Maak WordPress databank aan op Azure MySQL
  community.mysql.mysql_db:
    name: "{{ wp_db_name }}"
    state: present
    login_host: "{{ wp_db_host }}"
    login_port: "{{ wp_db_port }}"
    login_user: "{{ wp_db_admin_user }}"
    login_password: "{{ db_admin_password }}"
    ca_cert: /etc/ssl/certs/ca-certificates.crt
    check_hostname: false

- name: Maak WordPress DB gebruiker aan op Azure MySQL
  community.mysql.mysql_user:
    name: "{{ wp_db_user }}"
    password: "{{ db_wp_password }}"
    host: "%"
    priv: "{{ wp_db_name }}.*:ALL"
    state: present
    login_host: "{{ wp_db_host }}"
    login_port: "{{ wp_db_port }}"
    login_user: "{{ wp_db_admin_user }}"
    login_password: "{{ db_admin_password }}"
    ca_cert: /etc/ssl/certs/ca-certificates.crt
    check_hostname: false
