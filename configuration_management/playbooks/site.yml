---
- name: Volledige WordPress stack
  hosts: all
  become: true
  gather_subset: min
  pre_tasks:
    - name: Overschrijf wp_domain met Azure publieke FQDN vanuit Terraform
      set_fact:
        wp_domain: "{{ tf_public_fqdn }}"
      when: tf_public_fqdn is defined and tf_public_fqdn | length > 0

    - name: Overschrijf DB host met Terraform output indien aanwezig
      set_fact:
        wp_db_host: "{{ tf_mysql_fqdn }}"
      when: tf_mysql_fqdn is defined

    - name: Overschrijf DB admin user met Terraform output indien aanwezig
      set_fact:
        wp_db_admin_user: "{{ tf_mysql_admin_login }}"
      when: tf_mysql_admin_login is defined

  roles:
    - role: common
      when: not skip_common
    - mysql_client
    - wordpress

  post_tasks:
    - name: Toon verbindingsinformatie
      debug:
        msg:
          - "=========================================="
          - "WordPress is beschikbaar op:"
          - "https://{{ wp_domain }}"
          - ""
          - "MySQL: {{ wp_db_host }}:{{ wp_db_port }}"
          - "=========================================="

- name: Lokale SSH config bijwerken
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    ssh_config_path: "{{ lookup('env', 'HOME') }}/.ssh/config"
  tasks:
    - name: Backup maken van SSH config
      copy:
        src: "{{ ssh_config_path }}"
        dest: "{{ ssh_config_path }}.bak"
        remote_src: true
        mode: "0600"
      when: ssh_config_path is file

    - name: SSH config bestand aanmaken als het niet bestaat
      file:
        path: "{{ ssh_config_path }}"
        state: touch
        mode: "0600"
      changed_when: false

    - name: Bestaand azosboxes blok verwijderen
      blockinfile:
        path: "{{ ssh_config_path }}"
        marker: "# {mark} ANSIBLE MANAGED - {{ ssh_host_alias }}"
        state: absent

    - name: SSH config blok voor azosboxes toevoegen
      blockinfile:
        path: "{{ ssh_config_path }}"
        marker: "# {mark} ANSIBLE MANAGED - {{ ssh_host_alias }}"
        block: |
          Host {{ ssh_host_alias }}
              HostName {{ hostvars[groups['all'][0]]['ansible_host'] }}
              User {{ hostvars[groups['all'][0]]['ansible_user'] | default('osboxes') }}
              IdentityFile {{ ssh_key }}
              StrictHostKeyChecking no
              UserKnownHostsFile /dev/null
